name: Los Ojos veri topla

on:
  schedule:
    # Her 4 gunde bir 06:00 UTC (Turkiye ~09:00). Trendyol'u proxy'siz gormek
    # imkansiz; guvenilir toplama residential proxy istiyor (Scrape.do 10 kredi/
    # Scrapfly 25 kredi). Marka ~16 sayfa -> tam toplama Scrape.do'da ~160,
    # Scrapfly'da ~400 kredi. Iki motorun aylik 1000+1000 bedava kredisi birlikte
    # ~8-9 toplamaya (her ~4 gun) yeter. Gunluk icin ucretli plan gerekir.
    - cron: "0 6 */4 * *"
  workflow_dispatch: {}          # elle de calistirilabilsin (Run workflow butonu)

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Veriyi topla
        env:
          SCRAPFLY_TOKEN: ${{ secrets.SCRAPFLY_TOKEN }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
        run: python collector.py

      - name: Veriyi kaydet (commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "veri: $(date +%F)" || echo "Degisiklik yok, atlaniyor."
          git push
